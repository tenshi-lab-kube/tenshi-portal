<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/styles.css?v={{ .CSSVersion }}">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <div class="logo" aria-hidden="true">TL</div>
        <div class="header-text">
          <div class="header-top">
            <h1 class="site-name">{{ .Title }}</h1>
            <span class="env-badge">{{ .Environment }}</span>
          </div>
          <p class="site-desc">{{ .Subtitle }}</p>
        </div>
      </div>
      <div class="header-right">
        <span class="meta-label">Mis à jour le</span>
        <time class="meta-time">{{ .UpdatedAt }}</time>
      </div>
    </header>

    <div class="section-bar">
      <span class="section-label">Services</span>
      <span class="section-rule" aria-hidden="true"></span>
    </div>

    <main class="service-grid" aria-label="Services disponibles">
      {{ range .Services }}
      <article class="card card--{{ .Accent }}">
        <div class="card-header">
          <div class="card-icon" aria-hidden="true">{{ .Initials }}</div>
          <div class="card-tags">
            <span class="card-kind">{{ .Kind }}</span>
            <span class="card-status">
              <span class="status-dot" aria-hidden="true"></span>
              {{ .Status }}
            </span>
          </div>
        </div>
        <div class="card-body">
          <h3 class="card-name">{{ .Name }}</h3>
          <p class="card-desc">{{ .Description }}</p>
        </div>
        <a class="card-link" href="{{ .URL }}" rel="noopener">
          <span>Ouvrir le service</span>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
            <path d="M1 10L10 1M10 1H4M10 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </article>
      {{ end }}
    </main>

  </div>
</body>
</html>
