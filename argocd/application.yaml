apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenshi-portal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tenshi-lab-kube/tenshi-portal.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: tenshi-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
