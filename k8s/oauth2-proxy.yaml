apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenshi-portal-auth
  namespace: tenshi-portal
  labels:
    app.kubernetes.io/name: tenshi-portal-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenshi-portal-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenshi-portal-auth
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4180
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tenshi-portal-oidc
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tenshi-portal-oidc
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tenshi-portal-oidc
                  key: cookie-secret
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url=https://auth.tenshi-lab.fr/application/o/home-oidc/
            - --redirect-url=https://home.tenshi-lab.fr/oauth2/callback
            - --scope=openid profile email
            - --email-domain=*
            - --upstream=http://tenshi-portal-app.tenshi-portal.svc.cluster.local:8080
            - --reverse-proxy=true
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-refresh=1h
            - --cookie-expire=24h
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --pass-user-headers=true
            - --skip-provider-button=true
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 128Mi
