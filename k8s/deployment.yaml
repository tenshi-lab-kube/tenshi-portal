apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenshi-portal
  namespace: tenshi-portal
  labels:
    app.kubernetes.io/name: tenshi-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenshi-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenshi-portal
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s-worker-1
                      - k8s-worker-2
      containers:
        - name: app
          image: ghcr.io/tenshi-lab-kube/tenshi-portal:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PORTAL_ENV
              value: Tenshi Lab
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
